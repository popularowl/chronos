## End-to-end demo of the v1.6 Agent Registry + MCP Gateway.
##
## Composes Chronos, Postgres, a tiny in-tree streamable-http MCP server
## (./mcp/ — exposes `echo` and `add`), and a minimal TypeScript HTTP
## agent that calls back into the Chronos MCP gateway when prompted with
## `<n> + <m>`.
##
## See ./readme.md for the registration walkthrough.
##
services:
    chronos:
        image: chronos:local
        environment:
            DATABASE_TYPE: postgres
            DATABASE_HOST: postgres
            DATABASE_PORT: 5432
            DATABASE_NAME: chronos
            DATABASE_USER: chronos
            DATABASE_PASSWORD: secret
            CHRONOS_INITIAL_USER: admin@admin.com:test1234:admin
            DEBUG: true
            LOG_SANITIZE_HEADER_FIELDS: authorization,x-api-key,x-auth-token,cookie
            LOG_SANITIZE_BODY_FIELDS: password,pwd,pass,secret,token,apikey,api_key,accesstoken,access_token,refreshtoken
            ## v1.6 Agent Registry + MCP Gateway flags
            ENABLE_AGENTS: "true"
            ENABLE_MCP_SERVERS: "true"
            ## Required: the docker bridge network uses RFC1918 addresses, which
            ## the SSRF gate would otherwise reject. Dev-only.
            ALLOW_LOOPBACK_AGENTS: "true"
        ports:
            - "3001:3000"
        volumes:
            - ./.chronos:/root/.chronos
        depends_on:
            - postgres

    postgres:
        image: postgres:15
        ports:
            - "5432:5432"
        volumes:
            - ./.postgres_data:/var/lib/postgresql/data
        environment:
            POSTGRES_DB: chronos
            POSTGRES_USER: chronos
            POSTGRES_PASSWORD: secret

    ## Reference MCP server. ~50 LoC streamable-http server in ./mcp/ that
    ## exposes two tools: `echo` and `add`. Built locally so we don't depend
    ## on upstream image quirks (`mcp/everything` ships stdio + SSE only,
    ## and its SSE variant crashes after ~20s when no client has connected
    ## because of demo notification timers).
    ##
    ## Registration inside Chronos:
    ##   transport=streamable-http  url=http://mcp-reference:7800/mcp
    mcp-reference:
        build:
            context: ./mcp
        environment:
            PORT: "7800"
        ports:
            - "7800:7800"

    ## Minimal HTTP agent. Implements GET /health and POST /v1/chat/completions.
    ## When the last user message contains an expression like `2 + 3`, it
    ## calls back into the Chronos MCP gateway to invoke `reference.add`
    ## and returns the result. Otherwise it echoes the input.
    ##
    ## After registering this agent in the Chronos UI, copy the callback
    ## token from the agent detail page, set it on the host as
    ## EXAMPLE_AGENT_CALLBACK_TOKEN, then restart only this service:
    ##
    ##     EXAMPLE_AGENT_CALLBACK_TOKEN=<hex> docker compose up -d --no-deps example-agent
    example-agent:
        build:
            context: ./agent
        environment:
            PORT: "8001"
            CALLBACK_TOKEN: "${EXAMPLE_AGENT_CALLBACK_TOKEN:-}"
        ports:
            - "8001:8001"
        depends_on:
            - chronos
