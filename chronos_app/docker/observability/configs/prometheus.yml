global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape Chronos server Prometheus metrics endpoint
  # Active when ENABLE_METRICS=true and METRICS_PROVIDER=prometheus
  - job_name: "chronos-service"
    metrics_path: "/api/v1/metrics"
    static_configs:
      - targets: ["chronos:3000"]
    scrape_interval: 10s

  # Scrape Alloy internal metrics
  - job_name: "alloy"
    static_configs:
      - targets: ["alloy:12345"]

  # Scrape Tempo metrics
  - job_name: "tempo"
    static_configs:
      - targets: ["tempo:3200"]

  # Scrape Loki metrics
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
