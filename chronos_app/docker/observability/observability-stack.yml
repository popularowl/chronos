# Observability infrastructure stack.

networks:
  observability-network:
    name: observability-network

services:
  # Grafana Alloy - unified telemetry collector (logs, traces, metrics)
  alloy:
    image: grafana/alloy:latest
    ports:
      - "12345:12345"  # Alloy UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    volumes:
      - ./configs/alloy-config.alloy:/etc/alloy/config.alloy
      # allow access to docker runtime details
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./.alloy:/var/lib/alloy/data
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    networks:
      - observability-network
    depends_on:
      - loki
      - tempo
      - prometheus

  # Grafana Loki - log aggregation
  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    volumes:
      - ./configs/loki-config.yml:/etc/loki/local-config.yaml
      - ./.loki:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - observability-network

  # Grafana Tempo - distributed tracing
  tempo:
    image: grafana/tempo:2.6.1
    ports:
      - "3200:3200"    # Tempo HTTP API (Grafana queries here)
    volumes:
      - ./configs/tempo-config.yml:/etc/tempo/config.yml
      - ./.tempo:/var/tempo
    command: ["-config.file=/etc/tempo/config.yml"]
    networks:
      - observability-network

  # Prometheus - metrics storage
  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./.prometheus:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-remote-write-receiver"
      - "--web.enable-lifecycle"
    networks:
      - observability-network

  # Grafana - visualization
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning
      - ./.grafana:/var/lib/grafana
    networks:
      - observability-network
    depends_on:
      - loki
      - tempo
      - prometheus
      - alloy
