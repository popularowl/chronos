                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Deleted.

    /public-executions/{id}:
        get:
            tags: [executions]
            operationId: getPublicExecution
            summary: Get a publicly shared execution
            description: Public execution links bypass authentication. Returns the execution if it has been marked public on its agentflow.
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Execution.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Execution'
                '404':
                    description: Not found or not public.

components:
    responses:
        UnauthorizedError:
            description: Access token is missing or invalid.

    securitySchemes:
        bearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
            description: Chronos JWT issued by `/auth/login` (or an API key for `/prediction` and `/agents/*/chat/completions`).
        mcpGatewayToken:
            type: http
            scheme: bearer
            description: Per-agent MCP gateway bearer token. Obtained at agent registration; rotated via `/agents/{id}/regenerate-mcp-gateway-token`.

    schemas:
        ApiKey:
            type: object
            properties:
                id:
                    type: string
                    example: '525e4daa2104f06ffdea5c1af37009be'
                keyName:
                    type: string
                    example: 'my-integration'
                apiKey:
                    type: string
                    example: 'vYV8OdUMRzRQbzpp2JzY5DvriBnuVHo3pYpPQ7IJWyw='
                apiSecret:
                    type: string
                createdAt:
                    type: string
                    format: date-time

        Agentflow:
            type: object
            properties:
                id:
                    type: string
                    example: 'd290f1ee-6c54-4b01-90e6-d701748f0851'
                name:
                    type: string
                    example: 'Support Triage'
                flowData:
                    type: string
                    description: JSON-encoded flow graph.
                deployed:
                    type: boolean
                isPublic:
                    type: boolean
                apikeyid:
                    type: string
                chatbotConfig:
                    type: string
                apiConfig:
                    type: string
                analytic:
                    type: string
                speechToText:
                    type: string
                category:
                    type: string
                    example: 'support;triage'
                type:
                    type: string
                    enum: [CHATFLOW, MULTIAGENT, AGENTFLOW]
                createdDate:
                    type: string
                    format: date-time
                updatedDate:
                    type: string
                    format: date-time

        AgentflowVersion:
            type: object
            properties:
                id:
                    type: string
                agentflowId:
                    type: string
                version:
                    type: integer
                    example: 3
                flowData:
                    type: string
                publishedAt:
                    type: string
                    format: date-time

        Prediction:
            type: object
            properties:
                question:
                    type: string
                    description: Message to send to the flow.
                    example: 'What is the status of order #42?'
                form:
                    type: object
                    description: Structured form input (alternative to `question`, used by Agentflow V2).
                    additionalProperties: true
                streaming:
                    type: boolean
                    default: false
                overrideConfig:
                    type: object
                    additionalProperties: true
                    description: Runtime overrides (sessionId, model params, variables, etc).
                history:
                    type: array
                    items:
                        type: object
                        properties:
                            role:
                                type: string
                                enum: [apiMessage, userMessage]
                            content:
                                type: string
                uploads:
                    type: array
                    items:
                        $ref: '#/components/schemas/FileUpload'
                humanInput:
                    type: object
                    description: Resume execution from a stopped checkpoint.
                    properties:
                        type:
                            type: string
                            enum: [proceed, reject]
                        feedback:
                            type: string

        FileUpload:
            type: object
            properties:
                type:
                    type: string
                    enum: [audio, url, file, 'file:rag', 'file:full']
                name:
                    type: string
                    example: 'invoice.pdf'
                data:
                    type: string
                    description: Base64-encoded data or URL.
                mime:
                    type: string
                    example: 'application/pdf'

        CreateAttachmentResponse:
            type: object
            properties:
                name:
                    type: string
                mimeType:
                    type: string
                size:
                    type: string
                content:
                    type: string

        Variable:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                name:
                    type: string
                    example: 'API_KEY'
                value:
                    type: [string, 'null']
                type:
                    type: string
                    example: 'string'
                createdDate:
                    type: string
                    format: date-time
                updatedDate:
                    type: string
                    format: date-time

        Agent:
            type: object
            description: An external HTTP agent registered with the Agent Registry. Chronos invokes it over HTTP; the agent connects back to Chronos via the MCP gateway for tool access.
            properties:
                id:
                    type: string
                    format: uuid
                name:
                    type: string
                    example: 'support-bot'
                description:
                    type: string
                serviceEndpoint:
                    type: string
                    description: Base URL of the external agent (must implement the contract in `agent-protocol.openapi.yaml`).
                    example: 'https://support-bot.example.com'
                enabled:
                    type: boolean
                status:
                    type: string
                    enum: [HEALTHY, UNHEALTHY, UNKNOWN]
                lastHealthError:
                    type: [string, 'null']
                runtimeConfig:
                    type: object
                    additionalProperties: true
                    description: Health endpoint path, request shape (openai vs raw), etc.
                outboundAuth:
                    type: object
                    description: Auth Chronos sends with each request to the agent (Bearer or named header).
                    additionalProperties: true
                createdDate:
                    type: string
                    format: date-time
                updatedDate:
                    type: string
                    format: date-time

        McpServer:
            type: object
            description: A registered upstream MCP server. Tools surface in Chronos agentflows.
            properties:
                id:
                    type: string
                    format: uuid
                name:
                    type: string
                    example: 'company-knowledge'
                transport:
                    type: string
                    enum: [streamable-http, sse]
                    description: '`stdio` is reserved for future versions.'
                serverUrl:
                    type: string
                    example: 'https://mcp.example.com'
                authConfig:
                    type: object
                    additionalProperties: true
                enabled:
                    type: boolean
                status:
                    type: string
                    enum: [CONNECTED, DISCONNECTED, ERROR]
                lastError:
                    type: [string, 'null']
                createdDate:
                    type: string
                    format: date-time
                updatedDate:
                    type: string
                    format: date-time

        Schedule:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                name:
                    type: string
                    example: 'Nightly digest'
                cron:
                    type: string
                    example: '0 2 * * *'
                timezone:
                    type: string
                    example: 'UTC'
                target:
                    type: object
                    description: What to invoke when the schedule fires.
                    properties:
                        type:
                            type: string
                            enum: [agentflow, agent]
                        id:
                            type: string
                payload:
                    type: object
                    additionalProperties: true
                enabled:
                    type: boolean
                lastRunAt:
                    type: [string, 'null']
                    format: date-time
                nextRunAt:
                    type: [string, 'null']
                    format: date-time
                createdDate:
                    type: string
                    format: date-time

        Webhook:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                name:
                    type: string
                path:
                    type: string
                    description: Public path under `/webhooks/in/...` that triggers this webhook.
                target:
                    type: object
                    properties:
                        type:
                            type: string
                            enum: [agentflow, agent]
                        id:
                            type: string
                secret:
                    type: string
                    description: Shared signing secret. Returned in full only at creation / regeneration.
                enabled:
                    type: boolean
                lastDeliveredAt:
                    type: [string, 'null']
                    format: date-time

        Execution:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                agentflowId:
                    type: string
                state:
                    type: string
                    enum: [INPROGRESS, FINISHED, ERROR, STOPPED, TIMEOUT]
                input:
                    type: object
                    additionalProperties: true
                output:
                    type: object
                    additionalProperties: true
                error:
                    type: [string, 'null']
                isPublic:
                    type: boolean
                startedAt:
                    type: string
                    format: date-time
                finishedAt:
                    type: [string, 'null']
                    format: date-time

        OpenAIModel:
            type: object
            properties:
                id:
                    type: string
                    description: Agentflow id, or `agent:<agentId>` for registered agents.
                object:
                    type: string
                    example: 'model'
                created:
                    type: integer
                owned_by:
                    type: string
                    example: 'chronos'

        ChatCompletionMessage:
            type: object
            properties:
                role:
                    type: string
                    enum: [system, user, assistant, tool]
                content:
                    type: string
                name:
                    type: string

        ChatCompletionRequest:
            type: object
            required: [model, messages]
            properties:
                model:
                    type: string
                    description: Agentflow id or `agent:<agentId>`. Ignored when posting to `/agents/{id}/chat/completions`.
                    example: 'd290f1ee-6c54-4b01-90e6-d701748f0851'
                messages:
                    type: array
                    items:
                        $ref: '#/components/schemas/ChatCompletionMessage'
                stream:
                    type: boolean
                    default: false
                temperature:
                    type: number
                max_tokens:
                    type: integer
                x_chronos_override_config:
                    type: object
                    additionalProperties: true
                    description: Chronos-specific extension. Forwarded into `overrideConfig` on the underlying prediction.

        ChatCompletionResponse:
            type: object
            properties:
                id:
                    type: string
                    example: 'chatcmpl-abc123'
                object:
                    type: string
                    example: 'chat.completion'
                created:
                    type: integer
                model:
                    type: string
                choices:
                    type: array
                    items:
                        type: object
                        properties:
                            index:
                                type: integer
                            message:
                                $ref: '#/components/schemas/ChatCompletionMessage'
                            finish_reason:
                                type: string
                usage:
                    type: object
                    properties:
                        prompt_tokens:
                            type: integer
                        completion_tokens:
                            type: integer
                        total_tokens:
                            type: integer
