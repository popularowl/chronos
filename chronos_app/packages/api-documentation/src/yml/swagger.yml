    # ─────────────────────────────────────────────────────────────────────
    # Executions
    # ─────────────────────────────────────────────────────────────────────
    /executions:
        get:
            tags: [executions]
            security:
                - bearerAuth: []
            operationId: listExecutions
            summary: List executions
            parameters:
                - in: query
                  name: agentflowId
                  schema:
                      type: string
                - in: query
                  name: state
                  schema:
                      type: string
                      enum: [INPROGRESS, FINISHED, ERROR, STOPPED, TIMEOUT]
                - in: query
                  name: startDate
                  schema:
                      type: string
                      format: date-time
                - in: query
                  name: endDate
                  schema:
                      type: string
                      format: date-time
            responses:
                '200':
                    description: Executions.
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Execution'
        delete:
            tags: [executions]
            security:
                - bearerAuth: []
            operationId: bulkDeleteExecutions
            summary: Bulk delete executions
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                ids:
                                    type: array
                                    items:
                                        type: string
            responses:
                '200':
                    description: Deleted.

    /executions/{id}:
        get:
            tags: [executions]
