            responses:
                '200':
                    description: Deleted.

    /schedules/{id}/toggle:
        patch:
            tags: [schedules]
            security:
                - bearerAuth: []
            operationId: toggleSchedule
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Toggled.

    /schedules/{id}/executions:
        get:
            tags: [schedules]
            security:
                - bearerAuth: []
            operationId: getScheduleExecutions
            summary: List recent executions for a schedule
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Executions.

    # ─────────────────────────────────────────────────────────────────────
    # Webhooks
    # ─────────────────────────────────────────────────────────────────────
    /webhooks:
        get:
            tags: [webhooks]
            security:
                - bearerAuth: []
            operationId: listWebhooks
            responses:
                '200':
                    description: Webhooks.
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Webhook'
        post:
            tags: [webhooks]
            security:
                - bearerAuth: []
            operationId: createWebhook
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/Webhook'
            responses:
                '200':
                    description: Created.

    /webhooks/{id}:
        get:
            tags: [webhooks]
