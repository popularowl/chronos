# Intelligex Chronos Public API — community license surface.

tags:
    - name: ping
      description: Server liveness probe.
    - name: version
      description: Server build version.
    - name: verify
      description: API key verification.
    - name: apikey
      description: API key management for prediction authentication.
    - name: agentflows
      description: CRUD, publish/rollback and version history for agentflows.
    - name: prediction
      description: Invoke an agentflow with a message, form payload, files or human input.
    - name: attachments
      description: Upload binary attachments tied to a prediction session.
    - name: variables
      description: Flow-scoped variables resolved at execution time.
    - name: agents
      description: Registered external HTTP agents (Agent Registry control plane).
    - name: mcp-gateway
      description: Chronos as an MCP server (Streamable HTTP transport). Tool discovery and invocation for external MCP clients.
    - name: mcp-servers
      description: Registered upstream MCP servers (Streamable HTTP / SSE transports).
    - name: openai-compat
      description: OpenAI-compatible surface — call Chronos with any OpenAI SDK. Agentflows and registered agents appear as `models`.
    - name: schedules
      description: Cron-driven scheduled invocations of agentflows / agents.
    - name: webhooks
      description: Inbound HTTP webhook triggers that invoke agentflows / agents.
    - name: executions
      description: Read execution history (private and public).

paths:
    # ─────────────────────────────────────────────────────────────────────
    # Health / metadata
    # ─────────────────────────────────────────────────────────────────────
    /ping:
        get:
            tags: [ping]
            operationId: ping
            summary: Server liveness probe
            description: Returns `pong` when the Chronos server is reachable. No auth required.
            responses:
                '200':
                    description: Server is up.
                    content:
                        text/plain:
                            schema:
                                type: string
                                example: pong

    /version:
        get:
            tags: [version]
            operationId: getVersion
            summary: Get server version
            description: Returns the running Chronos server version.
            responses:
                '200':
                    description: Version info.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    version:
                                        type: string
                                        example: '1.8.0'

    /verify/apikey/{apikey}:
        get:
            tags: [verify]
            operationId: verifyApiKey
            summary: Verify an API key
            description: Returns 200 if the supplied API key is valid. Used by external integrations to validate a token before invoking `/prediction/{id}`.
            parameters:
                - in: path
                  name: apikey
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: API key is valid.
                '401':
                    description: API key is invalid.

    # ─────────────────────────────────────────────────────────────────────
    # API keys (auth for /prediction)
    # ─────────────────────────────────────────────────────────────────────
    /apikey:
        get:
            tags: [apikey]
            security:
                - bearerAuth: []
            operationId: listApiKeys
            summary: List API keys
            responses:
                '200':
                    description: API keys.
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/ApiKey'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
        post:
            tags: [apikey]
            security:
                - bearerAuth: []
            operationId: createApiKey
            summary: Create an API key
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                keyName:
                                    type: string
                                    example: 'my-integration'
            responses:
                '200':
                    description: Created API key.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ApiKey'

    /apikey/{id}:
        put:
            tags: [apikey]
            security:
                - bearerAuth: []
            operationId: updateApiKey
            summary: Rename an API key
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                keyName:
                                    type: string
            responses:
                '200':
                    description: Updated API key.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ApiKey'
        delete:
            tags: [apikey]
            security:
                - bearerAuth: []
            operationId: deleteApiKey
            summary: Delete an API key
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: API key deleted.

    /apikey/import:
        post:
            tags: [apikey]
            security:
                - bearerAuth: []
            operationId: importApiKeys
            summary: Bulk import API keys
            description: Used by export/import workflows and migrations.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                jsonFile:
                                    type: string
                                    description: Base64-encoded JSON file of API keys.
            responses:
                '200':
                    description: Imported.

    # ─────────────────────────────────────────────────────────────────────
    # Agentflows
    # ─────────────────────────────────────────────────────────────────────
    /agentflows:
        get:
            tags: [agentflows]
            security:
                - bearerAuth: []
            operationId: listAgentflows
            summary: List all agentflows
            responses:
                '200':
                    description: Array of agentflows.
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Agentflow'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
        post:
            tags: [agentflows]
            security:
                - bearerAuth: []
            operationId: createAgentflow
            summary: Create an agentflow
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/Agentflow'
            responses:
                '200':
                    description: Created agentflow.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Agentflow'

    /agentflows/{id}:
        get:
            tags: [agentflows]
            security:
                - bearerAuth: []
            operationId: getAgentflow
            summary: Get an agentflow by id
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Agentflow.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Agentflow'
                '404':
                    description: Not found.
        put:
            tags: [agentflows]
            security:
                - bearerAuth: []
            operationId: updateAgentflow
            summary: Update an agentflow
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/Agentflow'
            responses:
                '200':
                    description: Updated.
        delete:
            tags: [agentflows]
            security:
                - bearerAuth: []
            operationId: deleteAgentflow
            summary: Delete an agentflow
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Deleted.

    /agentflows/apikey/{apikey}:
        get:
            tags: [agentflows]
            operationId: getAgentflowByApiKey
            summary: Resolve an agentflow by API key
            description: Returns the agentflow associated with the supplied API key. Used by external clients that hold only the API key and need to discover the flow id.
            parameters:
                - in: path
                  name: apikey
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Agentflow.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Agentflow'
                '404':
                    description: No agentflow matches the supplied API key.

    /agentflows/{id}/publish:
        post:
            tags: [agentflows]
            security:
                - bearerAuth: []
            operationId: publishAgentflow
            summary: Publish a new version of an agentflow
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Published version.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AgentflowVersion'

    /agentflows/{id}/rollback/{version}:
        post:
            tags: [agentflows]
            security:
                - bearerAuth: []
            operationId: rollbackAgentflow
            summary: Roll an agentflow back to a previous version
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
                - in: path
                  name: version
                  required: true
                  schema:
                      type: integer
            responses:
                '200':
                    description: Rolled back.

    /agentflows/{id}/versions:
        get:
            tags: [agentflows]
            security:
                - bearerAuth: []
            operationId: listAgentflowVersions
            summary: List published versions of an agentflow
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Array of versions.
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/AgentflowVersion'

    /agentflows-streaming/{id}:
        get:
            tags: [agentflows]
            operationId: checkAgentflowStreaming
            summary: Check whether an agentflow supports streaming responses
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Streaming capability.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    isStreaming:
                                        type: boolean

    /agentflows-uploads/{id}:
        get:
            tags: [agentflows]
            operationId: checkAgentflowUploads
            summary: Check whether an agentflow accepts file uploads
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Upload capability.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    isImageUploadAllowed:
                                        type: boolean
                                    isSpeechToTextEnabled:
                                        type: boolean
                                    isRAGFileUploadAllowed:
                                        type: boolean
                                    isFullFileUpload:
                                        type: boolean

    # ─────────────────────────────────────────────────────────────────────
    # Prediction — invoke an agentflow
    # ─────────────────────────────────────────────────────────────────────
    /prediction/{id}:
        post:
            tags: [prediction]
            operationId: createPrediction
            summary: Send a message to an agentflow and get a response
            description: |
                Primary invocation endpoint. Accepts text (`question`), structured form
                input (`form`), file uploads (multipart `files`), conversation `history`
                and runtime overrides (`overrideConfig`). Supports streaming when
                `streaming: true`.

                Authentication: bearer JWT *or* per-flow API key configured on the
                agentflow.
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
                  description: Agentflow id.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/Prediction'
                    multipart/form-data:
                        schema:
                            type: object
                            properties:
                                files:
                                    type: array
                                    items:
                                        type: string
                                        format: binary
                                question:
                                    type: string
                                streaming:
                                    type: boolean
                                overrideConfig:
                                    type: string
                                    description: JSON-encoded override config.
            responses:
                '200':
                    description: 'Prediction result. When `streaming: true`, response is a Server-Sent Event stream of `text/event-stream` chunks.'
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: true
                        text/event-stream:
                            schema:
                                type: string
                '400':
                    description: Invalid request.
                '401':
                    $ref: '#/components/responses/UnauthorizedError'

    # ─────────────────────────────────────────────────────────────────────
    # Attachments — multipart uploads tied to a chat session
    # ─────────────────────────────────────────────────────────────────────
    /attachments/{agentflowId}/{chatId}:
        post:
            tags: [attachments]
            operationId: createAttachment
            summary: Upload files to a prediction session
            description: Multipart upload tied to a specific agentflow and chat id. Returns metadata describing each stored file for use in subsequent `/prediction/{id}` calls.
            parameters:
                - in: path
                  name: agentflowId
                  required: true
                  schema:
                      type: string
                - in: path
                  name: chatId
                  required: true
                  schema:
                      type: string
            requestBody:
                required: true
                content:
                    multipart/form-data:
                        schema:
                            type: object
                            properties:
                                files:
                                    type: array
                                    items:
                                        type: string
                                        format: binary
                            required: [files]
            responses:
                '200':
                    description: Array of stored attachments.
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/CreateAttachmentResponse'

    # ─────────────────────────────────────────────────────────────────────
    # Variables
    # ─────────────────────────────────────────────────────────────────────
    /variables:
        get:
            tags: [variables]
            security:
                - bearerAuth: []
            operationId: listVariables
            summary: List variables
            responses:
                '200':
                    description: Array of variables.
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Variable'
        post:
            tags: [variables]
            security:
                - bearerAuth: []
            operationId: createVariable
            summary: Create a variable
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/Variable'
            responses:
                '200':
                    description: Created.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Variable'

    /variables/{id}:
        put:
            tags: [variables]
            security:
                - bearerAuth: []
            operationId: updateVariable
            summary: Update a variable
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/Variable'
            responses:
                '200':
                    description: Updated.
        delete:
            tags: [variables]
            security:
                - bearerAuth: []
            operationId: deleteVariable
            summary: Delete a variable
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Deleted.

    # ─────────────────────────────────────────────────────────────────────
    # Agents (Agent Registry)
    # ─────────────────────────────────────────────────────────────────────
    /agents:
        get:
            tags: [agents]
            security:
                - bearerAuth: []
            operationId: listAgents
            summary: List registered external agents
            responses:
                '200':
                    description: Array of agents.
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Agent'
        post:
            tags: [agents]
            security:
                - bearerAuth: []
            operationId: createAgent
            summary: Register a new external HTTP agent
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/Agent'
            responses:
                '200':
                    description: Registered agent.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Agent'

    /agents/{id}:
        get:
            tags: [agents]
            security:
                - bearerAuth: []
            operationId: getAgent
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Agent.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Agent'
        put:
            tags: [agents]
            security:
                - bearerAuth: []
            operationId: updateAgent
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/Agent'
            responses:
                '200':
                    description: Updated.
        delete:
            tags: [agents]
            security:
                - bearerAuth: []
            operationId: deleteAgent
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Deleted.

    /agents/{id}/toggle:
        patch:
            tags: [agents]
            security:
                - bearerAuth: []
            operationId: toggleAgent
            summary: Enable or disable an agent
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Toggled.

    /agents/{id}/test-connection:
        post:
            tags: [agents]
            security:
                - bearerAuth: []
            operationId: testAgentConnection
            summary: Probe the agent's `/health` endpoint
            description: Hits the agent's configured health endpoint and returns the outcome. Used by the UI before persisting agent config.
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Probe outcome.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    healthy:
                                        type: boolean
                                    statusCode:
                                        type: integer
                                    error:
                                        type: string

    /agents/{id}/regenerate-mcp-gateway-token:
        post:
            tags: [agents]
            security:
                - bearerAuth: []
            operationId: regenerateMcpGatewayToken
            summary: Rotate the MCP gateway bearer token for an agent
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: New token returned once. Store it; it cannot be retrieved again.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    token:
                                        type: string

    /agents/{id}/invoke:
        post:
            tags: [agents]
            security:
                - bearerAuth: []
            operationId: invokeAgent
            summary: Invoke an external agent via Chronos
            description: Native Chronos invocation surface (not OpenAI-shaped). For OpenAI-shaped calls use `/agents/{id}/chat/completions` (see `openai-compat` tag).
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            additionalProperties: true
            responses:
                '200':
                    description: Agent response (passthrough).
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: true

    /agents/{id}/chat/completions:
        post:
            tags: [agents, openai-compat]
            security:
                - bearerAuth: []
            operationId: agentChatCompletions
            summary: OpenAI-compatible chat completions against a registered agent
            description: |
                Wire-compatible with `POST /v1/chat/completions` from the OpenAI API.
                Set `base_url` in any OpenAI SDK to `<chronos>/api/v1/agents/{id}` and
                send standard chat-completions requests. Supports streaming via SSE
                when `stream: true`.
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
                  description: Registered agent id.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ChatCompletionRequest'
            responses:
                '200':
                    description: 'Chat completion response. SSE stream when `stream: true`.'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ChatCompletionResponse'
                        text/event-stream:
                            schema:
                                type: string

    # ─────────────────────────────────────────────────────────────────────
    # MCP gateway (Chronos as MCP server)
    # ─────────────────────────────────────────────────────────────────────
    /mcp-gateway/{agentId}:
        post:
            tags: [mcp-gateway]
            operationId: mcpGatewayInvoke
            summary: MCP request (JSON-RPC)
            description: |
                Chronos exposes a real MCP server over Streamable HTTP. Tool discovery
                via `tools/list`, invocation via `tools/call`, change propagation via
                `notifications/tools/list_changed`. See `agent-protocol.openapi.yaml`
                for the full wire contract.
            security:
                - mcpGatewayToken: []
            parameters:
                - in: path
                  name: agentId
                  required: true
                  schema:
                      type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            additionalProperties: true
                            description: JSON-RPC 2.0 request body.
            responses:
                '200':
                    description: JSON-RPC response (single response) or SSE stream (multi-message).
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: true
                        text/event-stream:
                            schema:
                                type: string
                '401':
                    description: Missing or invalid MCP gateway bearer token.
        get:
            tags: [mcp-gateway]
            operationId: mcpGatewayStream
            summary: Open an MCP server-to-client stream
            security:
                - mcpGatewayToken: []
            parameters:
                - in: path
                  name: agentId
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: SSE stream.
                    content:
                        text/event-stream:
                            schema:
                                type: string
        delete:
            tags: [mcp-gateway]
            operationId: mcpGatewayClose
            summary: Close an MCP session
            security:
                - mcpGatewayToken: []
            parameters:
                - in: path
                  name: agentId
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Session closed.

    # ─────────────────────────────────────────────────────────────────────
    # MCP servers (registered upstream)
    # ─────────────────────────────────────────────────────────────────────
    /mcp-servers:
        get:
            tags: [mcp-servers]
            security:
                - bearerAuth: []
            operationId: listMcpServers
            summary: List registered upstream MCP servers
            responses:
                '200':
                    description: Array of MCP servers.
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/McpServer'
        post:
            tags: [mcp-servers]
            security:
                - bearerAuth: []
            operationId: createMcpServer
            summary: Register an upstream MCP server
            description: Supports `streamable-http` and `sse` transports. `stdio` is reserved.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/McpServer'
            responses:
                '200':
                    description: Registered.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/McpServer'

    /mcp-servers/{id}:
        get:
            tags: [mcp-servers]
            security:
                - bearerAuth: []
            operationId: getMcpServer
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: MCP server.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/McpServer'
        put:
            tags: [mcp-servers]
            security:
                - bearerAuth: []
            operationId: updateMcpServer
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/McpServer'
            responses:
                '200':
                    description: Updated.
        delete:
            tags: [mcp-servers]
            security:
                - bearerAuth: []
            operationId: deleteMcpServer
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Deleted.

    /mcp-servers/{id}/toggle:
        patch:
            tags: [mcp-servers]
            security:
                - bearerAuth: []
            operationId: toggleMcpServer
            summary: Enable or disable an MCP server
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Toggled.

    /mcp-servers/{id}/test-connection:
        post:
            tags: [mcp-servers]
            security:
                - bearerAuth: []
            operationId: testMcpServerConnection
            summary: Probe an MCP server
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Connection outcome.

    /mcp-servers/{id}/tools:
        get:
            tags: [mcp-servers]
            security:
                - bearerAuth: []
            operationId: listMcpServerTools
            summary: List tools exposed by an MCP server
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Tools array (raw `tools/list` payload from the upstream server).

    /mcp-servers/{id}/change-log:
        get:
            tags: [mcp-servers]
            security:
                - bearerAuth: []
            operationId: getMcpServerChangeLog
            summary: List recent `tools/list_changed` events from an MCP server
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Change log entries.

    /mcp-servers/preview-tools:
        post:
            tags: [mcp-servers]
            security:
                - bearerAuth: []
            operationId: previewMcpServerTools
            summary: Preview tools for an unsaved MCP server config
            description: Used by the UI to surface a `tools/list` response before persisting an MCP server registration.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/McpServer'
            responses:
                '200':
                    description: Tools array.

    # ─────────────────────────────────────────────────────────────────────
    # OpenAI compatibility surface
    # ─────────────────────────────────────────────────────────────────────
    /openai/chat/completions:
        post:
            tags: [openai-compat]
            operationId: openaiChatCompletions
            summary: OpenAI-compatible chat completions
            description: |
                Wire-compatible with `POST /v1/chat/completions`. Agentflows and
                registered agents are exposed as `model` ids — pass either an
                agentflow id or `agent:<agentId>` as `model`. SSE streaming when
                `stream: true`.

                Auth: standard OpenAI `Authorization: Bearer <api-key>` header,
                using either a Chronos API key (for agentflow models) or the
                agent's outbound token (for `agent:<id>` models).
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ChatCompletionRequest'
            responses:
                '200':
                    description: 'Chat completion response, SSE stream when `stream: true`.'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ChatCompletionResponse'
                        text/event-stream:
                            schema:
                                type: string

    /openai/models:
        get:
            tags: [openai-compat]
            operationId: openaiListModels
            summary: List models (agentflows + agents)
            description: "Returns OpenAI-shaped `{ object: 'list', data: [...] }` enumerating every agentflow and registered agent as a model."
            responses:
                '200':
                    description: Model list.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    object:
                                        type: string
                                        example: list
                                    data:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/OpenAIModel'

    /openai/models/{id}:
        get:
            tags: [openai-compat]
            operationId: openaiGetModel
            summary: Get a single model
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
                  description: Agentflow id or `agent:<agentId>`.
            responses:
                '200':
                    description: Model.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/OpenAIModel'

    /openai-realtime:
        get:
            tags: [openai-compat]
            operationId: openaiRealtimeListTools
            summary: List tools available to an OpenAI Realtime session
            description: Returns a tools array shaped for the OpenAI Realtime API's `session.update.tools`. Each tool is backed by an agentflow node.
            responses:
                '200':
                    description: Tools array.
        post:
            tags: [openai-compat]
            operationId: openaiRealtimeExecuteTool
            summary: Execute a tool from an OpenAI Realtime session
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            additionalProperties: true
                            description: OpenAI Realtime `response.function_call_arguments.done` payload.
            responses:
                '200':
                    description: Tool result.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: true

    /openai-realtime/{id}:
        get:
            tags: [openai-compat]
            operationId: openaiRealtimeListToolsForFlow
            summary: List tools for a specific agentflow
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Tools array.
        post:
            tags: [openai-compat]
            operationId: openaiRealtimeExecuteToolForFlow
            summary: Execute a tool against a specific agentflow
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            additionalProperties: true
            responses:
                '200':
                    description: Tool result.

    # ─────────────────────────────────────────────────────────────────────
    # Schedules
    # ─────────────────────────────────────────────────────────────────────
    /schedules:
        get:
            tags: [schedules]
            security:
                - bearerAuth: []
            operationId: listSchedules
            responses:
                '200':
                    description: Schedules.
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Schedule'
        post:
            tags: [schedules]
            security:
                - bearerAuth: []
            operationId: createSchedule
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/Schedule'
            responses:
                '200':
                    description: Created.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Schedule'

    /schedules/{id}:
        get:
            tags: [schedules]
            security:
                - bearerAuth: []
            operationId: getSchedule
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Schedule.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Schedule'
        put:
            tags: [schedules]
            security:
                - bearerAuth: []
            operationId: updateSchedule
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
